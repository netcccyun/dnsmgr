{extend name="common/layout" /}
{block name="title"}操作日志{/block}
{block name="main"}

<div class="row">
	<div class="col-xs-12 center-block" style="float: none;">
	<div class="panel panel-default panel-intro">
	<div class="panel-body">
	
<form onsubmit="return searchSubmit()" method="GET" class="form-inline" id="searchToolbar">
  <div class="form-group">
	<label>搜索</label>
    {if request()->user['level'] eq 2}<input type="text" class="form-control" name="uid" placeholder="UID">{/if}
	<input type="text" class="form-control" name="domain" placeholder="域名">
	<input type="text" class="form-control" name="kw" placeholder="操作类型/操作详情">
  </div>
  <button type="submit" class="btn btn-primary"><i class="fa fa-search"></i> 搜索</button>
  <a href="javascript:searchClear()" class="btn btn-default" title="刷新日志列表"><i class="fa fa-refresh"></i> 刷新</a>
</form>

      <table id="listTable">
	  </table>
    </div>
  </div>
</div>
</div>
{/block}
{block name="script"}
<script src="/static/js/layer/layer.js"></script>
<script src="/static/js/bootstrap-table-1.21.4.min.js"></script>
<script src="/static/js/bootstrap-table-page-jump-to-1.21.4.min.js"></script>
<script src="/static/js/custom.js"></script>
<script>
$(document).ready(function(){
	updateToolbar();
	const defaultPageSize = 15;
	const pageNumber = typeof window.$_GET['pageNumber'] != 'undefined' ? parseInt(window.$_GET['pageNumber']) : 1;
	const pageSize = typeof window.$_GET['pageSize'] != 'undefined' ? parseInt(window.$_GET['pageSize']) : defaultPageSize;
	var urlSort = typeof window.$_GET['sortName'] != 'undefined' ? window.$_GET['sortName'] : undefined;
	var urlOrder = typeof window.$_GET['sortOrder'] != 'undefined' ? window.$_GET['sortOrder'] : undefined;

	$("#listTable").bootstrapTable({
		url: '/log/data',
		pageNumber: pageNumber,
		pageSize: pageSize,
		classes: 'table table-striped table-hover table-bordered',
		sortReset: false,
		sortName: urlSort,
		sortOrder: urlOrder,
		onSort: function(name, order) {
			var $table = $('#listTable');
			if (!name) {
				$table.data('_sortClicks', null);
				return;
			}
			var clicks = $table.data('_sortClicks') || {};
			if (clicks._last !== name) {
				clicks = {_last: name};
				clicks[name] = 1;
				this.sortOrder = 'desc';
			} else {
				clicks[name] = (clicks[name] || 0) + 1;
				if (clicks[name] === 1) {
					this.sortOrder = 'desc';
				} else if (clicks[name] === 2) {
					this.sortOrder = 'asc';
				} else {
					this.sortName = undefined;
					this.sortOrder = undefined;
					clicks = {};
				}
			}
			$table.data('_sortClicks', clicks);
		},
		columns: [
			{
				field: 'id',
				title: 'ID',
				sortable: true
			},
			{
				field: 'uid',
				title: 'UID',
				sortable: true,
				formatter: function(value, row, index) {
					return value>0?'<a href="/user?kw='+value+'" target="_blank">'+value+'</a>':'管理员';
				}
			},
			{
				field: 'domain',
				title: '域名',
				sortable: true
			},
			{
				field: 'action',
				title: '操作类型',
				sortable: true
			},
            {
				field: 'data',
				title: '操作详情',
				sortable: true
			},
			{
				field: 'addtime',
				title: '时间',
				sortable: true
			}
		],
	})
})
</script>
{/block}
