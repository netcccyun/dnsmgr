{extend name="common/layout" /}
{block name="title"}SSL证书账户管理{/block}
{block name="main"}
<div class="row">
	<div class="col-xs-12 center-block" style="float: none;">
	<div class="panel panel-default panel-intro">
	<div class="panel-body">
	
<form onsubmit="return searchSubmit()" method="GET" class="form-inline" id="searchToolbar">
  <div class="form-group">
	<label>搜索</label>
	<input type="text" class="form-control" name="kw" placeholder="账户名称或备注">
  </div>
  <button type="submit" class="btn btn-primary"><i class="fa fa-search"></i> 搜索</button>
  <a href="javascript:searchClear()" class="btn btn-default" title="刷新SSL证书账户列表"><i class="fa fa-refresh"></i> 刷新</a>
  <a href="/cert/account/add?deploy=0" class="btn btn-success"><i class="fa fa-plus"></i> 添加</a>
</form>

      <table id="listTable">
	  </table>
    </div>
  </div>
</div>
</div>
{/block}
{block name="script"}
<script src="/static/js/layer/layer.js"></script>
<script src="/static/js/bootstrap-table-1.21.4.min.js"></script>
<script src="/static/js/bootstrap-table-page-jump-to-1.21.4.min.js"></script>
<script src="/static/js/custom.js?v=1006"></script>
<script>
$(document).ready(function(){
	updateToolbar();
	const pageSizeKey = 'certaccount_pagesize';
	const pageNumber = typeof window.$_GET['pageNumber'] != 'undefined' ? parseInt(window.$_GET['pageNumber']) : 1;
	const pageSize = getStoredPageSize(pageSizeKey);
	var urlSort = typeof window.$_GET['sortName'] != 'undefined' ? window.$_GET['sortName'] : undefined;
	var urlOrder = typeof window.$_GET['sortOrder'] != 'undefined' ? window.$_GET['sortOrder'] : undefined;

	$("#listTable").bootstrapTable({
		url: '/cert/account/data?deploy=0',
		pageNumber: pageNumber,
		pageSize: pageSize,
		classes: 'table table-striped table-hover table-bordered',
		sortReset: false,
		sortName: urlSort,
		sortOrder: urlOrder,
		onSort: function(name, order) {
			var $table = $('#listTable');
			if (!name) {
				$table.data('_sortClicks', null);
				return;
			}
			var clicks = $table.data('_sortClicks') || {};
			if (clicks._last !== name) {
				clicks = {_last: name};
				clicks[name] = 1;
				this.sortOrder = 'desc';
			} else {
				clicks[name] = (clicks[name] || 0) + 1;
				if (clicks[name] === 1) {
					this.sortOrder = 'desc';
				} else if (clicks[name] === 2) {
					this.sortOrder = 'asc';
				} else {
					this.sortName = undefined;
					this.sortOrder = undefined;
					clicks = {};
				}
			}
			$table.data('_sortClicks', clicks);
		},
		columns: [
			{
				field: 'id',
				title: 'ID',
				sortable: true
			},
			{
				field: 'typename',
				title: '所属平台',
				sortable: true,
				formatter: function(value, row, index) {
					return '<img src="/static/images/'+row.icon+'" class="type-logo"></img>'+value;
				}
			},
			{
				field: 'name',
				title: '账户名称',
				sortable: true
			},
			{
				field: 'remark',
				title: '备注',
				sortable: true
			},
			{
				field: 'addtime',
				title: '添加时间',
				sortable: true
			},
			{
				field: 'action',
				title: '操作',
				formatter: function(value, row, index) {
					var html = '<a href="/cert/account/edit?deploy=0&id='+row.id+'" class="btn btn-info btn-xs">编辑</a> <a href="javascript:delItem('+row.id+')" class="btn btn-danger btn-xs">删除</a> <a href="/cert/certorder?aid='+row.id+'" class="btn btn-default btn-xs">订单</a>';
					return html;
				}
			},
		],
		onPageChange: function(number, size){
			setStoredPageSize(pageSizeKey, size);
		},
	})
})
function delItem(id){
	layer.confirm('确定要删除此账户吗？', {
		btn: ['确定','取消']
	}, function(){
		$.post('/cert/account/del', {id: id, deploy: 0}, function(data){
			if(data.code == 0) {
				layer.msg('删除成功', {icon: 1, time:800});
				$('#listTable').bootstrapTable('refresh');
			} else {
				layer.alert(data.msg, {icon: 2});
			}
		}, 'json');
	});
}
</script>
{/block}
